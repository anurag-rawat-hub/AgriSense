<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropAI – AI Farming Assistant</title>
  <meta name="description" content="AI-powered crop disease assistant. Upload a leaf photo and get treatment, fertilizer, and yield recommendations.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #f5faf5;
      --bg-card:     #ffffff;
      --bg-soft:     #eef7ee;
      --accent:      #2ecc71;
      --accent-dark: #27ae60;
      --accent-pale: rgba(46,204,113,0.10);
      --accent-glow: rgba(46,204,113,0.22);
      --border:      rgba(46,204,113,0.20);
      --border-soft: #e0ede0;
      --text-main:   #1a2e1a;
      --text-muted:  #5a7a5a;
      --text-light:  #8aab8a;
      --sidebar-w:   240px;
      --radius:      16px;
      --radius-sm:   10px;
    }
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
    }

    /* ---- Sidebar toggle ---- */
    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 200;
      background: #fff;
      border: 1px solid #cce5cc;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(39,174,96,0.15);
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }
    @media (max-width: 768px) {
      .sidebar-toggle { display: flex; }
      .sidebar {
        left: -260px;
        top: 0;
        height: 100%;
        z-index: 150;
        transition: left 0.28s ease;
      }
      .sidebar.open { left: 0 !important; }
      .sidebar-overlay.open { display: block; }
      .main { min-width: 100vw; }
    }

    /* ---- Leaf decorations ---- */
    .leaf-deco {
      position: fixed;
      opacity: 0.065;
      pointer-events: none;
      z-index: 0;
    }
    .leaf-deco.tl { top:-80px; left:-60px; width:310px; transform:rotate(-20deg); }
    .leaf-deco.br { bottom:-80px; right:-60px; width:290px; transform:rotate(160deg); }

    /* ---- Sidebar ---- */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border-soft);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 16px rgba(46,204,113,0.06);
      z-index: 10;
    }
    .sidebar .logo {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar .logo span { color: var(--accent-dark); }
    .sidebar ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px; }
    .sidebar li a, .sidebar li.active {
      text-decoration:none;
      color:var(--text-muted);
      font-size:0.975rem;
      font-weight:500;
      padding:11px 16px;
      border-radius:var(--radius-sm);
      transition:all 0.25s;
      display:block;
      cursor:pointer;
    }
    .sidebar li a:hover { background:var(--accent-pale); color:var(--accent-dark); }
    .sidebar li.active { background:var(--accent-pale); color:var(--accent-dark); border:1px solid var(--border); font-weight:600; }

    /* ---- Main layout ---- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* ---- Top bar ---- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 36px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-soft);
      box-shadow: 0 2px 12px rgba(46,204,113,0.06);
    }
    .topbar h1 {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text-main);
    }
    .topbar .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(46,204,113,0.25);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(46,204,113,0.25); }
      50%      { box-shadow: 0 0 0 6px rgba(46,204,113,0.10); }
    }
    .topbar .caption {
      margin-left: auto;
      font-size: 0.82rem;
      color: var(--text-muted);
      background: var(--accent-pale);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ---- Upload panel ---- */
    .upload-panel {
      margin: 0 36px;
      padding: 18px 22px;
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .upload-label {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-soft);
      border: 1.5px dashed var(--accent);
      color: var(--accent-dark);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.25s;
    }
    .upload-label:hover { background: var(--accent-pale); border-color: var(--accent-dark); }

    #leaf-preview-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px 6px 8px;
    }
    #leaf-preview {
      width: 40px; height: 40px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border-soft);
    }
    #leaf-preview-name {
      font-size: 0.82rem;
      color: var(--text-muted);
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .remove-img-btn {
      background: none; border: none; cursor: pointer;
      color: #e74c3c; font-size: 1rem; padding: 0; line-height: 1;
    }

    #analyze-btn {
      display: none;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }
    #analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
    #analyze-btn.visible { display: flex; }

    /* ---- Chat area ---- */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: msgIn 0.3s ease both;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      font-weight: 700;
    }
    .avatar.ai  { background: var(--accent-pale); border: 1.5px solid var(--border); color: var(--accent-dark); }
    .avatar.usr { background: var(--accent-dark); color: #fff; }

    .bubble {
      max-width: 72%;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.65;
    }
    .bubble.ai {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-top-left-radius: 4px;
      color: var(--text-main);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .bubble.user {
      background: linear-gradient(135deg, var(--accent-dark), #3de080);
      color: #fff;
      border-top-right-radius: 4px;
    }

    /* structured response */
    .bubble.ai .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--accent-dark);
      margin: 14px 0 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bubble.ai .section-label:first-child { margin-top: 0; }
    .bubble.ai ul { margin: 4px 0 8px 16px; padding: 0; color: var(--text-main); }
    .bubble.ai ul li { margin-bottom: 4px; }

    /* uploaded image in chat */
    .bubble .chat-img {
      max-width: 200px;
      border-radius: 10px;
      margin-top: 8px;
      display: block;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center; padding: 8px 2px;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.7); opacity:0.5; }
      40%          { transform: scale(1.1); opacity:1; }
    }

    /* ---- Input bar ---- */
    .input-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 18px 36px 24px;
      background: var(--bg-card);
      border-top: 1px solid var(--border-soft);
    }

    #user-input {
      flex: 1;
      padding: 13px 18px;
      border: 1.5px solid var(--border-soft);
      border-radius: 50px;
      background: var(--bg-soft);
      color: var(--text-main);
      font-size: 0.97rem;
      font-family: inherit;
      outline: none;
      transition: all 0.25s;
    }
    #user-input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(46,204,113,0.10);
    }
    #user-input::placeholder { color: var(--text-light); }

    #send-btn {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      color: #fff;
      border: none;
      width: 46px; height: 46px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px var(--accent-glow); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>

<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

  <!-- Leaf decorations -->
  <svg class="leaf-deco tl" viewBox="0 0 200 260" fill="none"><path d="M100 10 C160 30,190 80,180 130 C170 180,130 220,100 250 C70 220,30 180,20 130 C10 80,40 30,100 10Z" fill="#27ae60"/><path d="M100 10 L100 250" stroke="#1e8449" stroke-width="5"/><path d="M100 80 C128 90,148 112,150 134" stroke="#1e8449" stroke-width="3" fill="none"/><path d="M100 130 C74 142,54 162,52 185" stroke="#1e8449" stroke-width="3" fill="none"/></svg>
  <svg class="leaf-deco br" viewBox="0 0 200 260" fill="none"><path d="M100 10 C160 30,190 80,180 130 C170 180,130 220,100 250 C70 220,30 180,20 130 C10 80,40 30,100 10Z" fill="#27ae60"/><path d="M100 10 L100 250" stroke="#1e8449" stroke-width="5"/><path d="M100 90 C126 102,144 124,145 148" stroke="#1e8449" stroke-width="3" fill="none"/></svg>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 200 260" fill="none"><path d="M100 10 C160 30,190 80,180 130 C170 180,130 220,100 250 C70 220,30 180,20 130 C10 80,40 30,100 10Z" fill="#27ae60"/><path d="M100 10 L100 250" stroke="#1e8449" stroke-width="6"/><path d="M100 80 C128 90,148 112,150 134" stroke="#1e8449" stroke-width="3" fill="none"/></svg>
      <span>Crop AI</span>
    </div>
    <ul>
      <li><a href="/index/"> Scanner</a></li>
      <li><a href="/dashboard/"> Dashboard</a></li>
      <li class="active"> AI Assistant</li>
    </ul>
  </nav>

  <!-- Main -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <svg width="28" height="28" viewBox="0 0 200 260" fill="none"><path d="M100 10 C160 30,190 80,180 130 C170 180,130 220,100 250 C70 220,30 180,20 130 C10 80,40 30,100 10Z" fill="#27ae60"/><path d="M100 10 L100 250" stroke="#1e8449" stroke-width="6"/></svg>
      <h1> AI Farming Assistant</h1>
      <div class="status-dot"></div>
      <span class="caption">Ollama · Local LLM</span>
    </div>

    <!-- Upload panel -->
    <div class="upload-panel">
      <label class="upload-label" for="image-upload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Leaf Photo
      </label>
      <input type="file" id="image-upload" accept="image/*" hidden>

      <div id="leaf-preview-wrap">
        <img id="leaf-preview" src="" alt="leaf preview">
        <span id="leaf-preview-name"></span>
        <button class="remove-img-btn" onclick="removeImage()" title="Remove image">✕</button>
      </div>

      <button id="analyze-btn" onclick="analyzeLeaf()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Analyze Leaf
      </button>

      <span style="margin-left:auto;font-size:0.82rem;color:var(--text-muted);">
        Upload a leaf photo ➜ get AI diagnosis + Treatment, Fertilizer &amp; Yield tips
      </span>
    </div>

    <!-- Chat messages -->
    <div id="chat-box">
      <!-- Welcome message injected by JS on load -->
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <input type="text" id="user-input" placeholder="Ask about crops, diseases, treatments..." autocomplete="off">
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div><!-- /.main -->

<script>
// ============================================================
// State
// ============================================================
let selectedFile = null;
let selectedImageURL = null;

// ============================================================
// DOM helpers
// ============================================================
const chatBox   = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');

function scrollBottom() {
  chatBox.scrollTop = chatBox.scrollHeight;
}

// ============================================================
// Render a message bubble
// ============================================================
function appendMessage(role, content, imgDataUrl = null) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + (role === 'user' ? 'usr' : 'ai');
  avatar.textContent = role === 'user' ? 'U' : '🌿';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');

  if (imgDataUrl) {
    const img = document.createElement('img');
    img.src = imgDataUrl;
    img.className = 'chat-img';
    bubble.appendChild(img);
    if (content) {
      const p = document.createElement('p');
      p.style.margin = '8px 0 0';
      p.textContent = content;
      bubble.appendChild(p);
    }
  } else if (role === 'ai') {
    bubble.innerHTML = formatAIResponse(content);
  } else {
    bubble.textContent = content;
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatBox.appendChild(row);
  scrollBottom();
  return bubble;
}

// ============================================================
// Format AI structured response
// ============================================================
function formatAIResponse(text) {
  // Detect section headers like "1. Treatment", "2. Fertilizer", etc.
  const sectionIcons = {
    'treatment':  '💊',
    'fertilizer': '🌿',
    'yield improv': '📈',
    'yield predict': '📊',
    'yield': '🌾',
    'disease': '🔬',
    'advice': '💡',
    'recommendation': '✅',
    'prevention': '🛡️',
    'symptom': '🩺',
  };

  let html = text;

  // Bold numbered headers
  html = html.replace(/^(\d+\.\s+[^\n]+)/gm, (match) => {
    let icon = '📌';
    const lower = match.toLowerCase();
    for (const [key, val] of Object.entries(sectionIcons)) {
      if (lower.includes(key)) { icon = val; break; }
    }
    return `<div class="section-label">${icon} ${match}</div>`;
  });

  // Bold **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Convert bullet lines
  html = html.replace(/^[•\-]\s+(.+)/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

  // Newlines → <br>
  html = html.replace(/\n/g, '<br>');

  // Clean up double <br>
  html = html.replace(/(<br>){2,}/g, '<br><br>');

  return html;
}

// ============================================================
// Typing indicator
// ============================================================
function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '🌿';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatBox.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

// ============================================================
// Image upload handling
// ============================================================
document.getElementById('image-upload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    selectedImageURL = ev.target.result;
    document.getElementById('leaf-preview').src = selectedImageURL;
    document.getElementById('leaf-preview-name').textContent = file.name;
    document.getElementById('leaf-preview-wrap').style.display = 'flex';
    document.getElementById('analyze-btn').classList.add('visible');
  };
  reader.readAsDataURL(file);
});

function removeImage() {
  selectedFile = null;
  selectedImageURL = null;
  document.getElementById('image-upload').value = '';
  document.getElementById('leaf-preview-wrap').style.display = 'none';
  document.getElementById('analyze-btn').classList.remove('visible');
}

// ============================================================
// Analyze Leaf — uploads photo, sends structured prompt
// ============================================================
async function analyzeLeaf() {
  if (!selectedFile) return;

  const imgURL = selectedImageURL;
  removeImage();

  // Show user message with image
  appendMessage('user', 'Uploaded leaf for analysis:', imgURL);

  // Show typing
  showTyping();

  // Build structured prompt
  const structuredPrompt = `You are an expert agronomist AI assistant. A farmer has uploaded a leaf image for disease analysis. Based on common crop leaf diseases, provide a structured response with exactly these 4 sections:

Give:
    1. Treatment
    2. Fertilizer suggestion
    3. Yield improvement tips
    4. Yield prediction

Be specific, practical, and concise for each section. If you cannot determine the exact disease from context, give general best-practice advice for the most common leaf diseases.`;

  try {
    const res = await fetch('/ask-ai/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: structuredPrompt })
    });
    const data = await res.json();
    hideTyping();

    const answer = data.answer || 'No response from AI.';
    appendMessage('ai', answer);
  } catch (err) {
    hideTyping();
    appendMessage('ai', '⚠️ Could not reach the AI. Make sure Ollama is running locally.');
  }
}

// ============================================================
// Send typed message
// ============================================================
let currentChatContext = "";

async function sendMessage() {
  const message = userInput.value.trim();
  if (!message) return;

  userInput.value = '';
  sendBtn.disabled = true;

  appendMessage('user', message);
  showTyping();

  const payloadPrompt = currentChatContext ? (currentChatContext + "\n\nUser question: " + message) : message;

  try {
    const res = await fetch('/ask-ai/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: payloadPrompt })
    });
    const data = await res.json();
    hideTyping();
    appendMessage('ai', data.answer || 'No response.');
  } catch (err) {
    hideTyping();
    appendMessage('ai', '⚠️ Could not reach the AI. Make sure Ollama is running locally.');
  }

  sendBtn.disabled = false;
  userInput.focus();
}

// Enter key to send
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ============================================================
// Welcome / initial AI message on page load
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  const lastScanDisease = sessionStorage.getItem('lastScanDisease');
  const lastScanAI = sessionStorage.getItem('lastScanAI');

  if (lastScanDisease && lastScanAI) {
    sessionStorage.removeItem('lastScanDisease');
    sessionStorage.removeItem('lastScanAI');

    currentChatContext = `Context: A leaf was scanned and diagnosed with ${lastScanDisease}. Recommended advice was: ${lastScanAI}.`;

    const continuedContext = `**Recent Scan Results:**\n\n**Disease:** ${lastScanDisease}\n\n**Advice:**\n${lastScanAI}\n\nHow I can help you more?`;

    appendMessage('ai', continuedContext);
  } else {
    const welcome = `Welcome! 👋 I'm your AI Farming Assistant powered by Ollama.

Upload a leaf photo above to receive:

1. Treatment — Disease management & remedies
2. Fertilizer suggestion — Nutrient recommendations
3. Yield improvement tips — Best practices for better harvest
4. Yield prediction — Expected output based on conditions

You can also type any question about crops, pests, or soil health below.`;

    appendMessage('ai', welcome);
  }
});
</script>
